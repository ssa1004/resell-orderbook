name: CodeQL

# Java/Kotlin SAST. market-domain 은 100% Kotlin, 나머지 모듈은 Java/Kotlin 혼용이라
# language 는 java-kotlin 하나로 양쪽을 함께 분석한다.
#
# push / PR trigger 는 ci.yml 과 같은 이유로 수동 검증용 비활성. 주 1회 스케줄로 정기
# 스캔만 돌리고, 필요 시 workflow_dispatch 로 즉시 실행한다.
on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 03:00 UTC — dependabot weekly 와 같은 날.
    - cron: '0 3 * * 1'
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # CodeQL 결과를 Security 탭에 업로드하기 위한 최소 권한.
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '21', cache: gradle }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # Gradle 멀티모듈이라 자동 빌드 추론이 불안정 — 명시 빌드 단계를 둔다.
          build-mode: manual

      - name: Build (compile only)
        run: ./gradlew compileJava compileKotlin --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
