name: CI

# push / PR trigger 는 현재 수동 검증용으로 비활성화했다.
# 자동 검증이 필요하면 아래 push / pull_request 블록을 활성화한다.
on:
  workflow_dispatch:
  # push:    { branches: [main] }
  # pull_request:
  #   branches: [main]

jobs:
  test:
    name: Build + Unit + Slice tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - name: Build + test (excluding e2e)
        run: ./gradlew test -x :e2e-tests:test --no-daemon
      - name: Modulith verify (도메인 경계 검증)
        run: ./gradlew :market-bootstrap:test --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/build/reports/tests/**'

  e2e:
    name: e2e Testcontainers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - name: e2e (Postgres Testcontainer)
        run: ./gradlew :e2e-tests:test --no-daemon
      - name: Upload e2e reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            e2e-tests/build/reports/tests/**
            e2e-tests/build/test-results/**

  static-analysis:
    name: Static analysis (compile -Xlint:all)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - run: ./gradlew compileJava compileKotlin --no-daemon

  image:
    name: Docker image build + Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - name: Build bootJar
        run: ./gradlew :market-bootstrap:bootJar --no-daemon
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t bid-ask-marketplace:${{ github.sha }} \
            -f infrastructure/Dockerfile .
      - name: Trivy scan
        # @master 같은 mutable ref 는 공급망 취약점 — tag 로 고정.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bid-ask-marketplace:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
