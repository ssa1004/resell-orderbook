spring:
  application:
    name: resell-orderbook
  profiles:
    default: dev
  autoconfigure:
    # dev 기본값 — Redis/Redisson/Kafka 비활성 (외부 의존 없이 H2 만으로 부팅)
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:h2:mem:market;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    # HikariCP 튜닝 (ADR-0024). dev 는 H2 라 풀 크기를 작게, leak detection 만 켜서 코드 변경
    # 시점에 connection 누수가 나면 즉시 stack trace 가 찍히도록.
    hikari:
      pool-name: market-hikari-dev
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000      # 풀에서 connection 못 받으면 3초 만에 fail
      validation-timeout: 1000
      idle-timeout: 600000          # 유휴 10분 후 회수
      max-lifetime: 1800000         # 30분 — DB 측 wait_timeout 보다 짧게
      leak-detection-threshold: 30000   # 30초 보유 시 stack trace 로그 (개발 중 누수 즉시 식별)
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false                   # Spring Batch jobs 는 명시 trigger 만
  kafka:
    bootstrap-servers: ""        # 빈 값 = consumer 비활성 (dev)
    consumer:
      group-id: market
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  lifecycle:
    # K8s rolling restart 시 처리 중 요청 / Kafka consumer / Saga 한 단계가 정리될 시간.
    # 도메인 트랜잭션 평균 ~100ms, outbox relay 한 batch (100건) ~ 수 초 → 30s 면 깔끔히 끝남.
    # K8s deployment 의 terminationGracePeriodSeconds 보다 작아야 SIGKILL 전에 끝낼 수 있다.
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  # SIGTERM 을 받으면 새 요청을 막고, 처리 중 요청은 끝날 때까지 대기 (graceful shutdown).
  # K8s rolling restart 와 짝지어 트래픽 손실 0 을 보장. preStop sleep 으로 endpoints 에서
  # pod 가 빠지는 시간 (보통 5~10s) 을 벌어주는 것이 전제.
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web.exposure.include: health,info,metrics,prometheus,modulith
  endpoint:
    health.probes.enabled: true
  metrics:
    tags.application: ${spring.application.name}
  tracing:
    sampling.probability: 1.0

# ── 도메인 정책 ───────────────────────────────
market:
  pg:
    enabled: false               # dev: MockPgClient
    base-url: ${PG_BASE_URL:http://wiremock:8090}
  bank:
    enabled: false               # dev: MockBankTransferClient
  storage:
    s3-enabled: false
    bucket: ${S3_BUCKET:resell-market-dev}
  cache:
    redis-enabled: false
    invalidation-broadcast:
      # cross-pod L1 evict broadcast (ADR-0022). dev 는 단일 인스턴스라 의미 없어 비활성.
      enabled: false
      channel: "market:cache:invalidate:market-stats:v1"
    market-stats:
      # 2단 캐시 — Caffeine L1 (in-process) + Redis L2 (분산). ADR-0019.
      l1-ttl-ms: 1000             # L1 짧게 — cross-pod 불일치 허용 시간이 곧 이 값
      l2-ttl-ms: 10000            # L2 길게 — DB 쿼리 부담을 ~10초 단위로 묶음
      l1-max-size: 10000          # in-process 메모리 보호. 인기 SKU 수 대비 충분
      lock-ttl-ms: 5000           # SETNX stampede lock TTL — loader p99 + 여유
      loader-retry-wait-ms: 50    # lock holder 가 채워주기를 기다리는 폴링 간격
      loader-retry-attempts: 3    # 폴링 횟수 — 이 후엔 fallback 으로 직접 loader 호출
  snowflake:
    # Snowflake ID 생성기 machine-id (ADR-0018). 0~1023. 미설정 시 hostname hash 로 자동.
    # 운영에서는 K8s StatefulSet ordinal 등으로 명시 권장.
    # machine-id: 0
  security:
    jwt:
      enabled: false
  idempotency:
    ttl-hours: 24                # Idempotency-Key 점유 기간 — TTL 지나면 같은 키 재사용 가능
  advisory-lock:
    # 같은 SKU 매칭 / 같은 검수 슬롯 예약을 한 줄로 줄세우는 PostgreSQL advisory lock
    # (= pg_advisory_xact_lock). H2 는 이 함수가 없어 dev 환경에서 끄고, 매칭 워커가 한
    # 대뿐이라 race 가 사실상 없어 안전.
    enabled: false               # prod (Postgres) 만 true
  outbox:
    relay:
      # OutboxRelay = Outbox 테이블의 미발행 행을 Kafka 로 보내는 백그라운드 워커.
      # dev 는 Kafka 자체를 끄므로 relay 도 함께 끔. prod 는 활성.
      enabled: false
      poll-interval-ms: 1000     # 미발행 행 폴링 주기 (= 도메인 commit ~ Kafka 발행 사이 지연 상한)
      batch-size: 100            # 한 번 폴링에 처리할 최대 행 수
      send-timeout-ms: 5000      # Kafka send 의 Future.get 타임아웃 (브로커 ack 기다리는 시간)
      topic-prefix: "market."    # eventType 앞에 붙이는 토픽 접두사 (예: "market.trademathched")
  trade:
    payment-ttl-minutes: 15
  fee:
    currency: KRW
    seller-commission-rate: 3.0
    buyer-commission-rate: 3.5
    inspection-fee: 3000
    shipping-fee: 3000
    fixed-processing-fee: 1000

  bulkhead:
    # 외부 호출 격리 풀 (ADR-0021). dev 는 비활성 (단일 인스턴스 + Mock 어댑터라 불필요).
    enabled: false
    instances:
      # PG (결제 게이트웨이) — peak 50 req/s × p99 200ms 가정 → 동시성 ≈ 10. 여유 50% 더해 코어 16.
      pg:
        core-size: 16
        max-pool-size: 16
        queue-capacity: 32
        await-timeout: 1s
        retry-after-seconds: 1
      # 은행 송금 — 호출 빈도 낮음 (정산 worker 가 직렬 처리 가깝게). 코어 8 로 충분.
      bank:
        core-size: 8
        max-pool-size: 8
        queue-capacity: 16
        await-timeout: 2s
        retry-after-seconds: 2

# Resilience4j — 외부 호출에 회로 차단기 + 재시도 적용 (ADR-0009 / ADR-0026).
resilience4j:
  circuitbreaker:
    instances:
      pg:
        slidingWindowSize: 20                       # 최근 호출 N건을 한 윈도우로 평가
        minimumNumberOfCalls: 10                    # 윈도우에 최소 N건 모이기 전엔 평가 안 함 (시작 직후 통계 부족 보호)
        failureRateThreshold: 50                    # 실패율 50% 초과 시 회로 OPEN (호출 차단)
        waitDurationInOpenState: 30s                # OPEN 유지 시간 — 이후 HALF_OPEN 으로 시험 호출 허용
        permittedNumberOfCallsInHalfOpenState: 3    # HALF_OPEN 에서 허용할 시험 호출 수 (모두 성공 시 CLOSED 복귀)
  retry:
    # ── 공통 정책 (ADR-0026) ──────────────────────────────────────
    # 1) 4xx 는 retry 안 함 (client 잘못 — 재시도해도 같은 4xx). 5xx / IOException 만 retry.
    # 2) exponential backoff (200ms → 400ms → 800ms) 로 외부에 burst 부담을 누적시키지 않는다.
    # 3) randomized-wait-factor 로 jitter 추가 — 100 client 가 동시에 같은 503 을 받고 한꺼번에
    #    재시도하는 *thundering herd* 방지. AWS 의 "Exponential Backoff and Jitter" (2015) 가 기본
    #    표준으로 자리 잡은 이래 Stripe / 토스페이먼츠 SDK 모두 같은 패턴.
    instances:
      pg:
        maxAttempts: 3                              # 첫 시도 + 재시도 최대 (3회 = 첫 1 + 재시도 2)
        waitDuration: 200ms                         # 첫 재시도 대기 (base)
        enableExponentialBackoff: true              # 매 재시도마다 대기를 multiplier 배로
        exponentialBackoffMultiplier: 2             # 200ms → 400ms → 800ms ...
        # jitter — base wait 의 ±50% 안에서 random. Resilience4j 는 *equal jitter* 와 비슷한
        # `wait × (1 ± factor)` 형태. 여러 client 가 같은 시점에 retry 하지 않도록 분산.
        randomizedWaitFactor: 0.5
        # retry 대상 = transient. SocketTimeout / ConnectException 같은 네트워크 블립과
        # 5xx 매핑 RuntimeException (RestClient 의 HttpServerErrorException) 만 재시도.
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        # 4xx 는 재시도해도 같은 결과 — 명시적으로 ignore.
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
      bank:
        # 운영 은행 어댑터로 진화 시 적용. mock 단계에서 정의해 두면 어댑터 추가 시 yml 변경 없음.
        # 송금은 *멱등성 보장 후* 에만 retry 가 안전 — idempotency-key 가 있어 같은 key 로 두 번
        # 실행되어도 한 번으로 수렴 (ADR-0008). 그래서 retry 자체는 안전.
        maxAttempts: 3
        waitDuration: 500ms                         # 은행 API 의 일반 SLA 가 PG 보다 길어 base 도 더 큼
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2             # 500ms → 1s → 2s
        randomizedWaitFactor: 0.5
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
      inspection-center:
        # 검수센터 외부 API (운영 진화 시). 검수 슬롯 조회 / 예약 결과 통보 등.
        maxAttempts: 3
        waitDuration: 300ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2             # 300ms → 600ms → 1200ms
        randomizedWaitFactor: 0.5
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException

---
spring:
  config:
    activate.on-profile: prod
  autoconfigure:
    exclude: []                  # prod 는 모두 enable
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:market}
    username: ${DB_USER:market}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # HikariCP 운영 튜닝 (ADR-0024).
    #
    # ── pool size 산정 ──
    # 동시 처리 ≈ 도착률(req/s) × 평균 트랜잭션 시간(s).
    # peak 60 req/s × 평균 100ms ≈ 6 connection. 매칭 worker / batch / outbox relay 에 +6,
    # burst 흡수용 여유 +10 → 22. 짝수 정리해서 24.
    # 위쪽 안전판 — DB 의 max_connections (예: 200) ÷ 운영 pod 수 (예: 8) = pod 당 25.
    # 24 ≤ 25 라 DB 측 한계도 안 넘는다.
    #
    # ── 무조건 크면 좋다? 아님 ──
    # connection 이 많으면 DB 측 lock contention / context switch 비용이 커진다 (Brett Wooldridge
    # 의 "About Pool Sizing" 가이드 — 코어 수 × 2 + 디스크 spindle 가 권장 상한). 짧은 트랜잭션
    # 다수가 적은 connection 을 빠르게 돌려쓰는 편이 처리량이 더 높다.
    #
    # ── leak-detection-threshold ──
    # connection 을 30초 넘게 보유 중이면 그 시점에 stack trace 를 WARN 로그로 — 풀 누수가
    # 즉시 잡혀 디버깅 시간 단축. 정상 트랜잭션이 30초 넘는 일은 본 도메인엔 없으므로 false
    # positive 위험 없음.
    hikari:
      pool-name: market-hikari
      maximum-pool-size: ${HIKARI_MAX_POOL:24}
      minimum-idle: ${HIKARI_MIN_IDLE:8}
      connection-timeout: 3000          # 풀에서 connection 받지 못하면 3초 만에 fail (서킷처럼 동작)
      validation-timeout: 1000          # 풀이 connection 살아있는지 검증하는 데 쓸 시간
      idle-timeout: 600000              # 유휴 10분 — 새벽 시간 풀 minimum-idle 까지 자연 축소
      max-lifetime: 1800000             # 30분 — Postgres idle_in_transaction_session_timeout / 클라우드 LB stickiness 보다 짧게
      keepalive-time: 300000            # 5분마다 live ping — 방화벽/NAT 유휴 끊김 방지
      leak-detection-threshold: 30000   # 30초 보유 = 누수 의심 → stack trace WARN
      # register-mbeans true — JMX 로 풀 상태 직접 조회 (Micrometer hikaricp.* 메트릭과 별개)
      register-mbeans: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI}

market:
  pg:
    enabled: true
  bank:
    enabled: true
  storage:
    s3-enabled: true
  cache:
    redis-enabled: true
    invalidation-broadcast:
      enabled: true
  security:
    jwt:
      enabled: true
  advisory-lock:
    enabled: true
  outbox:
    relay:
      enabled: true
  bulkhead:
    enabled: true
