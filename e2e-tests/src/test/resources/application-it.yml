spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cache:
    type: simple
  kafka:
    bootstrap-servers: ""

market:
  pg:
    enabled: false
  bank:
    enabled: false
  storage:
    s3-enabled: false
  cache:
    redis-enabled: false
  security:
    jwt:
      enabled: false
  advisory-lock:
    enabled: true            # prod 와 동일 경로로 매칭 검증 — pg_advisory_xact_lock + FOR UPDATE
  outbox:
    relay:
      enabled: false         # Kafka 비활성 — Outbox 만 INSERT 검증
  trade:
    payment-ttl-minutes: 15
  fee:
    currency: KRW
    seller-commission-rate: 3.0
    buyer-commission-rate: 3.5
    inspection-fee: 3000
    shipping-fee: 3000
    fixed-processing-fee: 1000
