events {}

http {
    server {
        listen 8080;

        # auth-service 의 OIDC discovery 문서. resell-orderbook 의
        # spring.security.oauth2.resourceserver.jwt.issuer-uri 가 가리키는 issuer 가
        # 부팅 시 이 endpoint 를 fetch 해서 jwks_uri 를 알아냄.
        location /.well-known/openid-configuration {
            default_type application/json;
            alias /usr/share/nginx/html/openid-configuration.json;
        }

        # auth-service 의 JWK Set. JwtDecoder 가 위 discovery 응답을 따라 호출.
        location /.well-known/jwks.json {
            default_type application/json;
            alias /usr/share/nginx/html/jwks.json;
        }

        location /healthz {
            return 200 "ok\n";
        }
    }
}
