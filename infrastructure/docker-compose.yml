version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  kafka:
    image: apache/kafka:3.8.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  wiremock:
    image: wiremock/wiremock:3.10.0
    ports: ["8090:8080"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro

  market:
    profiles: [app]   # docker-compose --profile app up
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_NAME: market
      DB_USER: market
      DB_PASSWORD: market
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      PG_BASE_URL: http://wiremock:8080
      OAUTH_ISSUER_URI: http://localhost:9000   # 실제 IdP 로 교체
    ports: ["8080:8080"]

  # k6 부하 시나리오 — docker compose --profile load up k6.
  # 컨테이너 안에서 호스트의 BASE_URL 을 보려면 host.docker.internal 사용.
  # 본 service 는 단발성 실행 (default command 가 없어 무한 sleep 으로 살아 있다가
  # `docker compose run --rm k6 run /scripts/scenarios/<name>.js` 로 띄우는 게 보통).
  k6:
    profiles: [load]
    image: grafana/k6:0.50.0
    volumes:
      - ../load/k6:/scripts:ro
    environment:
      BASE_URL: ${BASE_URL:-http://host.docker.internal:8080}
      K6_TOKEN: ${K6_TOKEN:-}
      K6_SKUS: ${K6_SKUS:-}
      CONCURRENT_MATCH_SKU: ${CONCURRENT_MATCH_SKU:-00000000-0000-0000-0000-cafe00000099}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # default 는 -h — 사용자가 `docker compose run --rm k6 run /scripts/scenarios/order-match.js`
    # 형태로 호출.
    entrypoint: ["k6"]
    command: ["-h"]
