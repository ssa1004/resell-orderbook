{{- /*
   비밀 값은 두 가지 경로로 들어온다.
     1) existingSecret 가 지정되면 chart 가 secret 을 만들지 않고 그쪽을 envFrom 으로 참조.
     2) 비어있으면 values 의 평문을 chart-managed secret 으로 생성.
   평문 값이 남아있을 때만 이 secret 을 만든다.
*/ -}}
{{- $needPgPwd := and (not .Values.postgres.existingSecret) (not (eq (default "" .Values.postgres.password) "")) -}}
{{- if $needPgPwd -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "resell-orderbook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resell-orderbook.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.postgres.password | quote }}
{{- end -}}
