# 운영 (prod) 오버라이드.
#   helm upgrade --install resell-orderbook ./helm/resell-orderbook \
#     -n market -f helm/resell-orderbook/values-prod.yaml \
#     --set postgres.existingSecret=market-postgres
#
# 비밀 값 (DB password) 은 chart 에 평문으로 두지 않고 ExistingSecret 참조.

springProfile: prod

replicaCount: 3

image:
  pullPolicy: IfNotPresent

# ----------------------------------------------------------------------------
# Ingress + TLS
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager 로 LE 발급. cert-manager 가 클러스터에 없다면 이 줄 제거하고
    # secretName 의 secret 을 외부에서 미리 만든다.
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: orderbook.example.com
      paths:
        - path: /api/v1/orderbook
          pathType: Prefix
        - path: /api/v1/trades
          pathType: Prefix
        - path: /api/v1/admin
          pathType: Prefix
  tls:
    - secretName: orderbook-tls
      hosts:
        - orderbook.example.com

# ----------------------------------------------------------------------------
# HPA + PDB
# ----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

# ----------------------------------------------------------------------------
# NetworkPolicy
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx

# ----------------------------------------------------------------------------
# 외부 의존 — secret 은 cluster 에 미리 생성된 것을 참조
# ----------------------------------------------------------------------------
postgres:
  host: postgres.market.svc.cluster.local
  port: 5432
  database: market
  user: market
  # password 는 existingSecret 으로만 주입 — 평문 비움
  password: ""
  existingSecret: market-postgres
  existingSecretPasswordKey: password

redis:
  host: redis.market.svc.cluster.local
  port: 6379

kafka:
  bootstrapServers: kafka.market.svc.cluster.local:9092

externalPg:
  baseUrl: https://pg-internal.example.com

oauth:
  issuerUri: https://idp.example.com/realms/market

# ----------------------------------------------------------------------------
# 운영에서는 wiremock 미사용
# ----------------------------------------------------------------------------
wiremock:
  enabled: false

# ----------------------------------------------------------------------------
# 운영용 ServiceAccount (IRSA)
# ----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/bid-ask-marketplace
